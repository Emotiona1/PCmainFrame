<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Panel</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
          'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.14)),
          linear-gradient(135deg, rgba(229, 231, 235, 0.48) 0%, rgba(243, 244, 246, 0.18) 100%);
        color: #0f172a;
      }

      .chat-view {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: 1fr auto;
      }

      .chat-history {
        padding: 28px;
        overflow-y: auto;
      }

      .bubble-row {
        display: flex;
        margin-bottom: 16px;
      }

      .bubble-row--contact {
        justify-content: flex-start;
      }

      .bubble-row--me {
        justify-content: flex-end;
      }

      .bubble {
        max-width: min(74%, 640px);
        padding: 14px 16px 12px;
        border-radius: 18px;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
      }

      .bubble-row--contact .bubble {
        background: white;
        border-bottom-left-radius: 6px;
      }

      .bubble-row--me .bubble {
        background: linear-gradient(135deg, #1d4ed8, #2563eb);
        color: white;
        border-bottom-right-radius: 6px;
      }

      .bubble__text {
        margin: 0;
        line-height: 1.65;
        font-size: 15px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .bubble__time {
        display: block;
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.72;
      }

      .composer {
        padding: 20px 24px 24px;
        border-top: 1px solid rgba(148, 163, 184, 0.16);
        background: rgba(255, 255, 255, 0.74);
      }

      .input {
        width: 100%;
        resize: none;
        border: 1px solid rgba(148, 163, 184, 0.38);
        border-radius: 18px;
        padding: 16px 18px;
        outline: none;
        background: rgba(255, 255, 255, 0.95);
        color: #0f172a;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 14px;
      }

      .button {
        min-width: 110px;
        border: 0;
        border-radius: 14px;
        padding: 12px 18px;
        background: linear-gradient(135deg, #1d4ed8, #2563eb);
        color: white;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="chat-view">
      <div class="chat-history">
        <article class="bubble-row bubble-row--contact">
          <div class="bubble">
            <p class="bubble__text">你好，方案看得怎么样了？</p>
            <time class="bubble__time">09:12</time>
          </div>
        </article>
        <article class="bubble-row bubble-row--me">
          <div class="bubble">
            <p class="bubble__text">我已经看完了，整体没问题。</p>
            <time class="bubble__time">09:15</time>
          </div>
        </article>
        <article class="bubble-row bubble-row--contact">
          <div class="bubble">
            <p class="bubble__text">好，那我今天整理后发你确认。</p>
            <time class="bubble__time">09:18</time>
          </div>
        </article>
      </div>

      <div class="composer">
        <textarea class="input" rows="4" readonly>输入消息，Enter 发送，Shift + Enter 换行</textarea>
        <div class="actions">
          <button class="button" type="button">发送</button>
        </div>
      </div>
    </div>
  </body>
  </html>
